# SonarQube Configuration
sonar.projectKey=cicd-demo-api
sonar.projectName=CI/CD Demo API
sonar.projectVersion=1.0

sonar.sources=src/
sonar.tests=tests/
sonar.sourceEncoding=UTF-8

# JavaScript / Node.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate thresholds (also set in SonarQube server UI)
# These are defaults — server-side gate takes precedence
# Reliability Rating: A
# Security Rating: A
# Maintainability Rating: A
# Coverage: >= 80%
# Duplicated Lines: < 3%